<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetScore</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="d-flex justify-content-center align-items-center mt-5 bg-dark">
    <div class="card w-50 h-50 m-5 p-2">

        <div class="card-title text-center">
            <h1 class="fw-bold text-secondary bg-light">NetScore</h1>


        </div>
        <div class="card-body d-flex justify-content-center align-items-center">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRkC_pKLrvkRcOnobpTz2v70AxNj-cj98hmTQ&s" alt="">
        </div>

        <div class="card-footer">

            <div>

                <div id="score">
                    <h1 class="text-center"><span id="t1score">0</span>/<span id="t2score">0</span></h1>
                </div>
                
                    
                

                <div class="row mt-3">
                    <div class="col-6 d-flex justify-content-center align-items-center">
                        <h1 class="fw-bold">TeamBlue</h1>
                        <br>
                        <button id="addblue" class="m-3 btn btn-outline-primary">AddPlayer</button>
                        <br>
                        <br>
                    </div>
                    <div class="col-6 d-flex justify-content-center align-items-center">
                        <h1 class="fw-bold">TeamRed</h1>
                        <br>
                        <button id="addred" class="m-3 btn btn-outline-danger">AddPlayer</button>
                        <br>
                        <br>
                    </div>

                </div>
                <div class="row">
                    <div class="col-6 d-flex justify-content-center align-items-center">
                        <ul id="blueplayer">

                        </ul>
                    </div>
                    <div class="col-6 d-flex justify-content-center align-items-center">
                        <ul id="redplayer">

                        </ul>
                    </div>

                </div>

                <div class="row">
                    <div class="col-6 d-flex justify-content-center align-items-center p-2">
                        <button id="bplus" class="btn btn-outline-success m-2">+1 Point</button>
                        
                    </div>
                    <div class="col-6 d-flex justify-content-center align-items-center p-2">
                        <button id="rplus" class="btn btn-outline-success m-2">+1 Point</button>
                        
                    </div>

                </div>

            </div>

        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
